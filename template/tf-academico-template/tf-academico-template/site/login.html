<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acesso — TF Guilherme Lourenço</title>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--bg:#0f1117;--surface:#1a1d2e;--border:#2d3148;--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

    .card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:16px;padding:48px 40px;width:100%;max-width:420px;
      text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);
    }

    .logo{font-size:48px;margin-bottom:16px;}

    .title{font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:6px;}
    .subtitle{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:32px;}

    .divider{border:none;border-top:1px solid var(--border);margin:24px 0;}

    /* Container do botão Google */
    #g_signin{display:flex;justify-content:center;margin-bottom:16px;}

    .error-box{
      background:#1a0a0a;border:1px solid #7f1d1d;border-radius:8px;
      padding:12px 16px;font-size:12px;color:#fca5a5;
      margin-top:16px;display:none;line-height:1.5;
    }
    .error-box.visible{display:block;}

    .loading-box{
      display:none;align-items:center;justify-content:center;
      gap:8px;font-size:13px;color:var(--muted);margin-top:16px;
    }
    .loading-box.visible{display:flex;}
    .mini-spin{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .meta{margin-top:32px;font-size:11px;color:var(--muted);line-height:1.8;}
    .meta strong{color:#94a3b8;}
  </style>
</head>
<body>

<div class="card">
  <div class="logo">🎓</div>
  <div class="title">Trabalho de Formatura</div>
  <div class="subtitle">
    Implementação de BI de Baixo Custo para MPEs<br>
    <strong style="color:#94a3b8;">Guilherme de Jesus Lourenço · POLI-USP</strong>
  </div>

  <hr class="divider"/>

  <div id="g_signin"></div>

  <div class="loading-box" id="loading">
    <div class="mini-spin"></div>
    Verificando acesso...
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="meta">
    O acesso é restrito a e-mails autorizados.<br>
    Em caso de dúvidas, entre em contato com<br>
    <strong>guilhermejlou@gmail.com</strong>
  </div>
</div>

<script>
  // Recupera CLIENT_ID injetado pelo servidor ou via meta tag
  const CLIENT_ID = document.querySelector('meta[name="google-client-id"]')?.content
    || '__GOOGLE_CLIENT_ID__';

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.classList.add('visible');
    document.getElementById('loading').classList.remove('visible');
  }

  function showLoading() {
    document.getElementById('loading').classList.add('visible');
    document.getElementById('error-box').classList.remove('visible');
  }

  // Callback do Google Sign-In
  async function handleCredential(response) {
    showLoading();
    try {
      const res  = await fetch('/api/auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ credential: response.credential }),
      });
      const data = await res.json();

      if (res.ok && data.ok) {
        window.location.href = '/';
      } else {
        showError(data.message || data.error || 'Acesso negado.');
      }
    } catch(e) {
      showError('Erro de conexão. Tente novamente.');
    }
  }

  // Inicializa o Google Sign-In após carregar a lib
  window.addEventListener('load', () => {
    if (typeof google === 'undefined') {
      showError('Erro ao carregar Google Sign-In. Verifique sua conexão.');
      return;
    }
    google.accounts.id.initialize({
      client_id:          CLIENT_ID,
      callback:           handleCredential,
      auto_select:        false,
      cancel_on_tap_outside: true,
    });
    google.accounts.id.renderButton(
      document.getElementById('g_signin'),
      {
        theme:  'filled_black',
        size:   'large',
        shape:  'pill',
        width:  280,
        text:   'signin_with',
        locale: 'pt-BR',
      }
    );
  });
</script>
</body>
</html>
