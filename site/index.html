<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capim Software — Sistema de Gestão da Inovação | Grupo 6</title>
  <link rel="icon" href="/logomarca.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --navy:#0B2136; --navy2:#112B47; --green:#3DB87A;
      --green3:#A8EDCA; --white:#F4F9F6; --muted:#7FA89A;
      --border:rgba(61,184,122,0.18);
      --serif:'DM Serif Display',serif; --sans:'DM Sans',sans-serif;
    }
    html,body{width:100%;height:100%;background:var(--navy);color:var(--white);font-family:var(--sans);overflow:hidden;}
    body{display:flex;flex-direction:column;}
    header{background:var(--navy2);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0;flex-wrap:wrap;}
    .h-left{display:flex;align-items:center;gap:14px;min-width:0;}
    .h-left img{width:38px;height:auto;flex-shrink:0;}
    .h-text{display:flex;flex-direction:column;gap:2px;min-width:0;}
    .h-title{font-family:var(--serif);font-size:.98rem;color:var(--white);line-height:1.2;}
    .h-sub{font-size:.66rem;color:var(--muted);letter-spacing:.02em;}
    .h-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:.72rem;font-weight:600;letter-spacing:.03em;cursor:pointer;text-decoration:none;border:1px solid transparent;transition:.15s;white-space:nowrap;font-family:var(--sans);}
    .btn-primary{background:var(--green);color:#04130b;}
    .btn-primary:hover{background:#34a36c;transform:translateY(-1px);}
    .btn-ghost{background:rgba(255,255,255,.04);color:var(--green3);border-color:var(--border);}
    .btn-ghost:hover{background:rgba(61,184,122,.12);}
    .toolbar{background:#0E1D2E;border-bottom:1px solid var(--border);padding:7px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:.66rem;color:var(--muted);}
    .toolbar strong{color:var(--green3);}
    .main{flex:1;position:relative;background:#22262d;overflow:hidden;}
    .main iframe{width:100%;height:100%;border:none;display:block;}
    .fallback{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:32px;}
    .fallback p{color:var(--muted);font-size:.8rem;max-width:420px;}
    @media (max-width:640px){
      .h-title{font-size:.85rem;}
      .h-sub{display:none;}
      header{padding:12px 16px;}
      .toolbar{padding:6px 16px;}
    }
  </style>
</head>
<body>

<header>
  <div class="h-left">
    <img src="/logomarca.png" alt="Capim" />
    <div class="h-text">
      <div class="h-title">Capim Software — Sistema de Gestão da Inovação</div>
      <div class="h-sub">Grupo 6 · PRO3584 · Escola Politécnica da USP · Prof. Mario Sergio Salerno</div>
    </div>
  </div>
  <div class="h-right">
    <a href="/main.pdf" download="capim-software-relatorio.pdf" class="btn btn-ghost">⬇ Baixar PDF</a>
    <a href="/apresentacao/" class="btn btn-primary">▶ Ver apresentação</a>
  </div>
</header>

<div class="toolbar">
  <span>📄 Relatório técnico-acadêmico · LaTeX + <strong>abntex2</strong> · Normas <strong>ABNT NBR 14724</strong></span>
  <span id="last-build">⏳ verificando última compilação…</span>
</div>

<div class="main">
  <iframe id="pdf-frame" src="/main.pdf#toolbar=1&navpanes=0&view=FitH" title="Relatório — Capim Software">
    <div class="fallback">
      <p>Seu navegador não exibe PDFs incorporados.</p>
      <a href="/main.pdf" class="btn btn-primary">Abrir relatório em nova aba</a>
    </div>
  </iframe>
</div>

<script>
  fetch('/last_build.txt?t=' + Date.now())
    .then(r => r.ok ? r.text() : '')
    .then(t => { if (t) document.getElementById('last-build').textContent = '🕐 ' + t.split('\n')[0]; })
    .catch(() => {});
</script>
</body>
</html>
